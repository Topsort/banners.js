name: Bug report
description: Something isn't working as expected
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check [existing issues](https://github.com/Topsort/banners.js/issues) and the [README](https://github.com/Topsort/banners.js#readme).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet that reproduces the issue.
      placeholder: |
        1. Set window.TS.token = "..."
        2. Add <topsort-banner id="..." width="..." height="...">
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: banners.js version
      placeholder: "0.7.0"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / environment
      placeholder: "Chrome 130, Safari 18, Node 20 (jsdom), …"
    validations:
      required: true
