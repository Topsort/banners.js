name: Feature request
description: Suggest an addition or change
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        banners.js is intentionally lightweight. Features that add bundle weight or complexity face a high bar — please read the [philosophy](https://github.com/Topsort/banners.js/blob/main/CLAUDE.md#philosophy) before filing.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. Why can't you achieve this with the current API?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you tried?
