name: Lint
on:
  pull_request:
  workflow_dispatch:

env:
  lockfile: pnpm-lock.yaml
  node_version: "24"

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install Actionlint
        env:
          version: "1.7.7"
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v${{ env.version }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run Actionlint
        run: |
          echo "::add-matcher::.github/matchers/actionlint.json"
          actionlint -color

  typos:
    name: Check for language typos
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # No major tag unfortunately
        # https://github.com/crate-ci/typos/issues/857
      - uses: crate-ci/typos@v1.45.2

  tsc:
    name: Type checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install PNPM
        id: pnpm-install

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node_version }}
          cache: pnpm
          cache-dependency-path: ${{ env.lockfile }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TSC
        run: tsc --noEmit

  lint:
    name: Biome Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Biome
        uses: biomejs/setup-biome@v2

      - name: Run Biome
        run: biome ci
